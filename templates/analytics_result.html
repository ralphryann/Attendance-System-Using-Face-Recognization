{% extends "base.html" %}

{% block title %}Analytics Result{% endblock %}

{% block content %}
<div class="card card-wide text-center">
  <h1 class="card-title"><i class="fa-solid fa-chart-column"></i> Attendance Analytics</h1>
  <p class="card-subtitle">Chart generated from attendance records.</p>

  <img
    src="{{ url_for('static', filename=image.split('static/')[-1]) }}"
    alt="Attendance Chart"
    class="chart-image"
  />

  <div class="btn-group btn-group-inline">
    <a href="/view_analytics" class="btn btn-primary btn-auto">
      <i class="fa-solid fa-rotate-right"></i> Analyze Again
    </a>
    <a href="/" class="btn btn-outline btn-auto">
      <i class="fa-solid fa-house"></i> Home
    </a>
  </div>
</div>
{% endblock %}
