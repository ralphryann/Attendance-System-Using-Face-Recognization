{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="card" style="margin: 0 auto;">
  <div class="text-center">
    <div class="card-icon" style="width:64px;height:64px;border-radius:var(--radius-lg);background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--primary-hover);">
      <i class="fa-solid fa-user-shield"></i>
    </div>
  </div>
  <h1 class="card-title">Sign In</h1>
  <p class="card-subtitle">Use your account to access attendance features.</p>

  <form action="{{ url_for('login') }}" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <input type="hidden" name="next" value="{{ request.args.get('next', '') }}" />

    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input type="text" id="username" name="username" required class="form-control" />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input type="password" id="password" name="password" required class="form-control" />
    </div>

    <button type="submit" class="btn btn-primary">
      <i class="fa-solid fa-right-to-bracket"></i> Login
    </button>
  </form>
</div>
{% endblock %}
