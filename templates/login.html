{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="bg-white shadow-2xl rounded-3xl p-8 sm:p-10 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-20 h-20 rounded-2xl bg-orange-100 text-orange-600 flex items-center justify-center mx-auto mb-4 text-3xl">
        <i class="fa-solid fa-user-shield"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-800">Sign In</h1>
      <p class="text-gray-500 mt-2">Use your account to access attendance features.</p>
    </div>

    <form action="{{ url_for('login') }}" method="post" class="space-y-5">
      <input type="hidden" name="next" value="{{ request.args.get('next', '') }}" />

      <label class="block">
        <span class="text-sm font-semibold text-gray-700">Username</span>
        <input type="text" name="username" required class="w-full mt-2 px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-300" />
      </label>

      <label class="block">
        <span class="text-sm font-semibold text-gray-700">Password</span>
        <input type="password" name="password" required class="w-full mt-2 px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-300" />
      </label>

      <button type="submit" class="w-full bg-gray-900 hover:bg-black text-white font-semibold py-3 rounded-xl shadow-md transition duration-300">
        <i class="fa-solid fa-right-to-bracket mr-2"></i> Login
      </button>
    </form>
  </div>
</div>
{% endblock %}
