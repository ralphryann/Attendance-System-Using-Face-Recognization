{% extends "base.html" %}

{% block title %}Attendance Analytics{% endblock %}

{% block content %}
<div class="card card-wide">
  <div class="two-col">

    <!-- Left Illustration -->
    <div class="col-illustration">
      <img src="{{ url_for('static', filename='pie-chart.gif') }}" alt="Analytics"
           class="animate-bounce-slow" />
    </div>

    <!-- Right Form -->
    <div class="col-form">
      <h1 class="card-title"><i class="fa-solid fa-chart-column"></i> Attendance Analytics</h1>
      <p class="card-subtitle">Generate charts by batch, month, and subject scope.</p>

      <form method="POST" action="/view_analytics">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="form-group">
          <label class="form-label" for="batch"><i class="fa-solid fa-folder"></i> Batch Name</label>
          <select id="batch" name="batch" required class="form-control">
            <option value="">-- Select Batch --</option>
            {% for batch in batches %}
            <option value="{{ batch }}">{{ batch }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="month"><i class="fa-solid fa-calendar-days"></i> Month (1–12)</label>
          <input id="month" type="number" name="month" min="1" max="12" required class="form-control" placeholder="e.g. 5" />
        </div>

        <div class="form-group">
          <label class="form-label"><i class="fa-solid fa-chart-line"></i> Analysis Type</label>
          <div class="radio-group mt-1">
            <label class="radio-option">
              <input type="radio" name="choice" value="1" onclick="toggleSubjectField()" checked />
              Single Subject
            </label>
            <label class="radio-option">
              <input type="radio" name="choice" value="2" onclick="toggleSubjectField()" />
              All Subjects
            </label>
          </div>
        </div>

        <div class="form-group" id="subject-input">
          <label class="form-label" for="subject"><i class="fa-solid fa-book"></i> Subject Name</label>
          <select id="subject" name="subject" class="form-control">
            <option value="">-- Select Subject --</option>
            {% for subject in subjects %}
            <option value="{{ subject }}">{{ subject }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="btn-group">
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-magnifying-glass"></i> View Chart
          </button>
        </div>

        <div class="btn-group btn-group-inline mt-1">
          <button type="submit" name="format" value="csv"
                  formaction="{{ url_for('export_attendance') }}" formmethod="get"
                  class="btn btn-secondary btn-auto">
            <i class="fa-solid fa-file-csv"></i> Export CSV
          </button>
          <button type="submit" name="format" value="xlsx"
                  formaction="{{ url_for('export_attendance') }}" formmethod="get"
                  class="btn btn-secondary btn-auto">
            <i class="fa-solid fa-file-excel"></i> Export Excel
          </button>
          <a href="/" class="btn btn-outline btn-auto">
            <i class="fa-solid fa-house"></i> Home
          </a>
        </div>
      </form>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function toggleSubjectField() {
    var choice = document.querySelector('input[name="choice"]:checked').value;
    var showSubject = (choice === '1');
    document.getElementById('subject-input').style.display = showSubject ? 'block' : 'none';
    document.getElementById('subject').required = showSubject;
  }
  toggleSubjectField();
</script>
{% endblock %}
