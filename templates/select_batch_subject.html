{% extends "base.html" %}

{% block title %}Select Batch & Subject{% endblock %}

{% block content %}
<div class="card card-wide">
  <div class="two-col">

    <!-- Left Illustration -->
    <div class="col-illustration">
      <img src="https://cdn-icons-png.flaticon.com/512/4202/4202843.png" alt="Attendance"
           class="animate-bounce-slow" />
    </div>

    <!-- Right Form -->
    <div class="col-form">
      <h2 class="card-title"><i class="fa-solid fa-clipboard"></i> Select Batch &amp; Subject</h2>
      <p class="card-subtitle">Choose a class and subject to start face-recognition attendance.</p>

      <form action="/submit_attendance" method="post">
        <div class="form-group">
          <label class="form-label" for="batch"><i class="fa-solid fa-users"></i> Batch</label>
          <select id="batch" name="batch" required class="form-control">
            <option value="">-- Select Batch --</option>
            {% for batch in batches %}
            <option value="{{ batch }}">{{ batch }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="subject"><i class="fa-solid fa-book"></i> Subject</label>
          <select id="subject" name="subject" required class="form-control">
            <option value="">-- Select Subject --</option>
            {% for subject in subjects %}
            <option value="{{ subject }}">{{ subject }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="btn-group">
          <button type="submit" class="btn btn-success">
            <i class="fa-solid fa-circle-check"></i> Take Attendance
          </button>
          <a href="/" class="btn btn-outline">
            <i class="fa-solid fa-house"></i> Back to Home
          </a>
        </div>
      </form>
    </div>

  </div>
</div>
{% endblock %}
