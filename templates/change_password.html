{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="card" style="margin: 0 auto; max-width: 520px;">
  <div class="text-center">
    <div class="card-icon" style="width:64px;height:64px;border-radius:var(--radius-lg);background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--primary-hover);">
      <i class="fa-solid fa-key"></i>
    </div>
  </div>
  <h1 class="card-title">Change Password</h1>
  <p class="card-subtitle">Update your account password securely.</p>

  <form method="post" action="{{ url_for('change_password') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="form-group">
      <label class="form-label" for="current_password">Current Password</label>
      <input type="password" id="current_password" name="current_password" required class="form-control" />
    </div>

    <div class="form-group">
      <label class="form-label" for="new_password">New Password</label>
      <input type="password" id="new_password" name="new_password" required class="form-control" />
    </div>

    <div class="form-group">
      <label class="form-label" for="confirm_password">Confirm New Password</label>
      <input type="password" id="confirm_password" name="confirm_password" required class="form-control" />
    </div>

    <div class="btn-group btn-group-inline">
      <button type="submit" class="btn btn-primary btn-auto">
        <i class="fa-solid fa-floppy-disk"></i> Save Password
      </button>
      <a href="{{ url_for('home') }}" class="btn btn-outline btn-auto">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
