{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="bg-white shadow-2xl rounded-3xl p-8 sm:p-10 w-full max-w-lg">
    <div class="mb-8 text-center">
      <div class="w-20 h-20 rounded-2xl bg-blue-100 text-blue-600 flex items-center justify-center mx-auto mb-4 text-3xl">
        <i class="fa-solid fa-key"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-800">Change Password</h1>
      <p class="text-gray-500 mt-2">Update your account password securely.</p>
    </div>

    <form method="post" action="{{ url_for('change_password') }}" class="space-y-5">
      <label class="block">
        <span class="text-sm font-semibold text-gray-700">Current Password</span>
        <input type="password" name="current_password" required class="w-full mt-2 px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
      </label>

      <label class="block">
        <span class="text-sm font-semibold text-gray-700">New Password</span>
        <input type="password" name="new_password" required class="w-full mt-2 px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
      </label>

      <label class="block">
        <span class="text-sm font-semibold text-gray-700">Confirm New Password</span>
        <input type="password" name="confirm_password" required class="w-full mt-2 px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
      </label>

      <div class="flex flex-col sm:flex-row gap-3 pt-2">
        <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl shadow-md transition duration-300">
          <i class="fa-solid fa-floppy-disk mr-2"></i> Save Password
        </button>
        <a href="{{ url_for('home') }}" class="flex-1 text-center bg-gray-700 hover:bg-gray-800 text-white font-semibold py-3 rounded-xl shadow-md transition duration-300">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
